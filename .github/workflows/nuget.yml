name: Build, Test & Publish NuGet

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  publish:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        project:
          - { name: NBullet, path: NBullet/NBullet.csproj }
          - { name: NBullet.Secp256k1, path: NBullet.Secp256k1/NBullet.Secp256k1.csproj }
          - { name: NBullet.BouncyCastle, path: NBullet.BouncyCastle/NBullet.BouncyCastle.csproj }
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from csproj
        id: version
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' ${{ matrix.project.path }})
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION for ${{ matrix.project.name }}"

      - name: Check if version already published
        id: check
        run: |
          PACKAGE_ID=$(echo "${{ matrix.project.name }}" | tr '[:upper:]' '[:lower:]')
          RESPONSE=$(curl -s "https://api.nuget.org/v3-flatcontainer/${PACKAGE_ID}/index.json" || echo '{"versions":[]}')
          if echo "$RESPONSE" | grep -q "\"${{ steps.version.outputs.version }}\""; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version ${{ steps.version.outputs.version }} already published for ${{ matrix.project.name }}, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version ${{ steps.version.outputs.version }} not yet published for ${{ matrix.project.name }}."
          fi

      - name: Build & Pack
        if: steps.check.outputs.exists == 'false'
        run: |
          dotnet build --configuration Release
          dotnet pack ${{ matrix.project.path }} --configuration Release --no-build --output ./nupkg

      - name: Publish to NuGet
        if: steps.check.outputs.exists == 'false' && env.NUGET_API_KEY != ''
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push ./nupkg/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
